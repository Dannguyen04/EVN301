<script>
const TIPS = {"m": [{"t": "Module 1 — Nghiên cứu & Ý tưởng", "k": [["PEST", "**P**olitical · **E**conomic · **S**ocial · **T**echnological → môi trường **vĩ mô**. Nhớ: *\"Phở Em Sáng Thứ 7\"*."], ["SWOT", "**S**trengths · **W**eaknesses (nội bộ) · **O**pportunities · **T**hreats (bên ngoài). Câu hỏi hay hỏi \"key component of SWOT\" → chọn **Opportunities**."], ["Quy trình 4 bước", "**Strategic intent → Planning → Execution → Evaluation**. Nhớ: *S-P-E-E*. Hỏi \"first stage\" = Strategic intent. Hỏi \"after planning\" = Execution."], ["Primary vs Secondary data", "**Primary** = tự mình thu (survey, interview, observation). **Secondary** = người khác đã thu (báo cáo chính phủ, sách, blog). Nhược điểm secondary = **outdated**."], ["Feasibility screening", "Trả lời 1 câu duy nhất: *sự kiện có làm được không?* → xét **budget, venue, hạ tầng, năng lực thực thi**. KHÔNG xét dress code / MC script / poster."], ["SCAMPER", "Công cụ **sáng tạo ý tưởng**. Mọi câu hỏi về SCAMPER → đáp án luôn hướng về \"explore creative alternatives\"."], ["Gantt chart", "Chỉ dùng để **lên lịch công việc (scheduling)**. Không liên quan ngân sách hay thiết kế."]]}, {"t": "Module 2 — Địa điểm & Mặt bằng", "k": [["Thứ tự chọn venue", "**Identify requirements → Shortlist → Site visit → Negotiate → Sign contract**. Hỏi \"first step\" = xác định yêu cầu, KHÔNG phải book/ký."], ["ADA", "**A**mericans with **D**isabilities **A**ct → khả năng tiếp cận cho **người khuyết tật**. Là **yêu cầu pháp lý**, không phải để tiết kiệm hay trang trí."], ["Site visit / inspection", "Mục đích = **phát hiện vấn đề layout trước**, đánh giá độ phù hợp. Walk-through với venue manager = **xác nhận sắp xếp & logistics**."], ["Yếu tố quan trọng nhất", "Hỏi \"most important factor\" → **Location**. Hỏi \"ảnh hưởng cả budget lẫn trải nghiệm\" → cũng là **Venue location**."], ["Crowd flow", "Mục đích = **chống ùn tắc + an toàn**. Không bao giờ là giảm chi phí hay tăng giá vé."], ["Bẫy tình huống venue", "Trade show có hàng hoá/thiết bị → chọn nơi **bãi đỗ lớn, logistics dễ**, kể cả xa trung tâm."]]}, {"t": "Module 3 — Sản xuất & Trải nghiệm", "k": [["AV", "**A**udio **V**isual. Test AV trước để **ngăn sự cố kỹ thuật**."], ["Carù & Cova (4 giai đoạn)", "**Nesting → Investigation → Stamping**. Giai đoạn **cuối = Stamping**. Nesting = đón/định vị ban đầu; Exploration/Build = tự do khám phá."], ["Pine & Gilmore", "5 nguyên tắc thiết kế trải nghiệm — **không bao giờ** có \"giảm giá vé\". Bẫy kinh điển."], ["5 giác quan", "Sensory immersion = thị/thính/khứu/vị/xúc giác. **Time KHÔNG phải giác quan** → đáp án cho câu \"NOT typically engaged\"."], ["Production schedule", "Tài liệu nêu **lịch trình sự kiện**, lợi ích = **tránh xung đột & trễ**. Bước đầu tiên khi phối hợp nhiều bộ phận → luôn là **lập production schedule/checklist**."], ["Rehearsal", "= chạy thử toàn chương trình trước ngày diễn."]]}, {"t": "Module 4 — Nhân sự", "k": [["Ai làm gì", "**AV technician** = thiết bị kỹ thuật · **Stage manager** = sân khấu · **Security team** = kiểm soát đám đông · **Safety/H&S officer** = tuân thủ an toàn · **Front-of-house manager** = dịch vụ khách · **Event manager** = điều phối tổng."], ["Từ vựng", "**HR** = Human Resources · **PPE** = Personal Protective Equipment · **Rota** = lịch ca làm · **Break rota** = lịch nghỉ giải lao · **Cross-training** = đào tạo đa vai trò."], ["Nguyên tắc xử lý tình huống nhân sự", "Luôn chọn phương án **giải quyết chủ động + tôn trọng người**: gọi backup, họp align, coach riêng tư, brief nhanh. Tránh phương án trừng phạt, đuổi việc, hoặc bỏ mặc."], ["Tuyển đúng người", "Vai trò **guest service** → chọn ứng viên **kỹ năng chăm sóc khách**, không phải người nhiều kinh nghiệm hơn."], ["Diversity", "Lý do = mang lại **kỹ năng & góc nhìn đa dạng**, không phải để làm hình ảnh."]]}, {"t": "Module 5 — Marketing & Tài chính", "k": [["Viết tắt", "**ROI** = Return on Investment · **KPI** = Key Performance Indicator · **Reach** = số người thấy quảng cáo · **Conversion rate** = tỷ lệ click → mua vé."], ["Fixed vs Variable", "**Fixed** = không đổi theo số khách (thuê venue, thuê sân khấu). **Variable** = đổi theo số khách (đồ ăn, quà tặng, ghế)."], ["Tài liệu tài chính", "**Budget** = dự toán thu chi tương lai · **Income statement** = tổng kết thu chi · **Invoice** = yêu cầu thanh toán · **Contingency fund** = quỹ dự phòng khẩn cấp."], ["Procurement", "= mua sắm hàng hoá/dịch vụ. **Competitive bidding** = mời nhiều nhà cung cấp báo giá. Hợp đồng nhiều năm → lợi ích = **giá ổn định**."], ["Nguyên tắc tình huống tài chính", "Trước khi trả tiền → **đọc lại hợp đồng đã ký**. Trước khi nhận chiết khấu trả trước → **kiểm tra dòng tiền (cash flow)**. Ba báo giá → chọn **tầm trung + review tốt**."], ["Chọn kênh marketing", "Tiêu chí số 1 = **nơi khán giả của bạn dành thời gian**. Người lớn tuổi → **print media**. Đừng dựa vào 1 kênh duy nhất."], ["A/B testing", "So sánh 2 phiên bản xem cái nào hiệu quả hơn."]]}, {"t": "Module 6 — Vận hành & Rủi ro", "k": [["Ngày diễn ra", "Việc **đầu tiên** = **team briefing**. Việc **cuối cùng** = **load-out + post-event clean-up**."], ["Tài liệu ngày D", "**Running order** = trình tự chương trình · **Contact sheet** = danh bạ liên hệ · **Signage** = biển chỉ dẫn cho khách."], ["Contingency plan", "= kế hoạch dự phòng cho sự cố bất ngờ. Sự kiện ngoài trời → rủi ro số 1 luôn là **thời tiết**."], ["Công thức xử lý sự cố (rất hay ra)", "1️⃣ **Thông báo & xin lỗi khách** · 2️⃣ **Đưa giải pháp thay thế ngay** (đồ uống, món khác, khu chờ) · 3️⃣ **Gọi backup/chuyên môn** (first aid, backup technician, backup supplier). Không giấu khách, không đổ lỗi, không chờ đợi thụ động."], ["Sự cố kỹ thuật nhỏ giữa show", "**Sửa nhanh, không gây chú ý** — đừng dừng chương trình."], ["Stakeholder phản đối", "Cư dân lo ồn ào → **mời họ vào bàn thảo luận + trình bày biện pháp kiểm soát**, không né tránh."]]}, {"t": "Module 7 — Đánh giá & Đo lường", "k": [["Formative vs Summative", "**Formative = TRONG khi diễn ra** (điều chỉnh kịp). **Summative = SAU sự kiện** (tổng kết). Nhớ: *For-mative = For now*, *Sum-mative = Sum up*."], ["Qualitative vs Quantitative", "**Qualitative** = phi số: bình luận, phỏng vấn, focus group → sâu nhưng khó đo. **Quantitative** = số: lượng khách, doanh thu, net profit."], ["Chọn phương pháp", "Sâu nhất cá nhân → **one-on-one interview** · Sâu nhóm → **focus group** · Nhanh & diện rộng → **online survey** · Thời gian thực → **mobile polling app** · Quan sát hành vi trực tiếp → **observation**."], ["Thời điểm khảo sát", "Gửi survey **trong vài ngày sau sự kiện** — đủ để khách nhớ, chưa quên."], ["Liên kết SMART", "Câu hỏi đánh giá phải bám **mục tiêu SMART** để đo đúng thành công đã đặt ra. Evaluation phải được **cài vào từ khâu lập kế hoạch**."], ["Cho nhà tài trợ", "Feedback hậu sự kiện dùng để **chứng minh ROI** → giữ hợp tác lần sau."], ["Bẫy", "Lý do đánh giá KHÔNG bao giờ là **quyết định lương nhân viên**. Nhược điểm dữ liệu tự báo cáo = **thiên lệch**."]]}, {"t": "Module 8 — Xu hướng & Công nghệ", "k": [["Hybrid event", "= kết hợp **trực tiếp + trực tuyến**. Động lực của virtual event = **tiếp cận toàn cầu**."], ["ISO 20121", "Chứng nhận **sự kiện bền vững / môi trường**. Chỉ 1 con số này thôi — nhớ kỹ."], ["QR code", "Công nghệ hỗ trợ **check-in không chạm**."], ["Data-driven personalization", "Xu hướng dùng dữ liệu để **cá nhân hoá trải nghiệm** khách."]]}], "g": [["🎯 Quy luật vàng khi đoán đáp án", "Đáp án đúng gần như luôn là phương án **nghiêm túc, tổng quát, hướng đến mục tiêu & con người**. Các phương án về **màu sắc, font chữ, dress code, hashtag, thiết kế vé** hầu hết là mồi nhử."], ["⚠️ Cảnh giác đáp án 'tham lam'", "Phương án nào vừa hứa lợi ích vừa kèm điều tiêu cực (\"tăng chất lượng **và tăng chi phí**\", \"tăng lợi nhuận **trong khi tăng chi phí tổ chức**\") → gần như luôn SAI."], ["🧩 Câu tình huống (scenario)", "Ưu tiên: bám **mục tiêu/SMART objective** > **giải pháp chủ động, có backup** > **giao tiếp minh bạch với khách**. Tránh phương án né tránh, im lặng, hoặc chiều lòng nội bộ."], ["📌 \"First step\" luôn là bước phân tích", "Hỏi bước đầu tiên → chọn phương án **xác định yêu cầu / làm rõ mục tiêu / lập kế hoạch / brief**, không phải bước hành động (ký, đặt, gửi)."], ["🔤 Danh sách viết tắt cần thuộc lòng", "PEST · SWOT · SCAMPER · AV · ADA · HR · PPE · ROI · KPI · ISO 20121 · FOH (Front of House)"]]};
const DATA = [{"title": "Module 1 — Nghiên cứu, Tính khả thi & Phát triển ý tưởng", "desc": "Phân tích môi trường (PEST/SWOT), nghiên cứu dữ liệu, sàng lọc khả thi, phát triển & kiểm định ý tưởng, lập kế hoạch.", "qs": [{"q": "What aspect of macro-environment may influence an event's timing?", "opts": ["The dress code of performers", "The color of event banners", "The length of the evaluation form", "The political or economic climate"], "ans": 3, "exp": "Môi trường vĩ mô (PEST) gồm chính trị & kinh tế — bầu cử, suy thoái, lễ lớn đều chi phối thời điểm tổ chức. Trang phục, màu banner là chi tiết vi mô."}, {"q": "What does a PEST analysis evaluate?", "opts": ["Planning, Execution, Strategy, Teamwork", "People, Environment, System, Tools", "Political, Economic, Social, Technological", "Publicity, Engagement, Sponsorship, Timing"], "ans": 2, "exp": "PEST = Political, Economic, Social, Technological — khung phân tích môi trường vĩ mô."}, {"q": "In the event model, which step follows planning?", "opts": ["Execution", "Evaluation", "Concept design", "Venue search"], "ans": 0, "exp": "Vòng đời sự kiện: Strategic intent → Planning → **Execution** → Evaluation. Sau khi lập kế hoạch là triển khai."}, {"q": "What does 'inception' refer to in event planning?", "opts": ["Ending", "Initial idea", "Staff reward", "Email invites"], "ans": 1, "exp": "Inception = khởi thuỷ, tức ý tưởng ban đầu trước khi thành concept chính thức."}, {"q": "What does 'target audience' mean?", "opts": ["The group of people an event is aimed at", "The event staff", "The sponsors", "The media"], "ans": 0, "exp": "Target audience = nhóm người sự kiện nhắm tới. Nhân viên, nhà tài trợ, báo chí là stakeholder chứ không phải khán giả mục tiêu."}, {"q": "Your event team suggests exciting activities, but they don't align with the client's primary goal of educating attendees. What's the best approach?", "opts": ["Remove all fun activities", "Include both entertainment and education to balance experience", "Prioritize activities that match SMART objectives and event purpose", "Let the team lead the design for better morale"], "ans": 2, "exp": "Bám mục tiêu SMART và mục đích sự kiện của khách hàng, không chạy theo ý tưởng lệch hướng."}, {"q": "What is a major consideration when assessing market demand for an event?", "opts": ["Number of food stalls", "Stage direction", "Target audience interest", "Performer contracts"], "ans": 2, "exp": "Đo cầu thị trường = xem khán giả mục tiêu có quan tâm không. Số quầy đồ ăn hay hợp đồng nghệ sĩ là chi tiết vận hành, đến sau."}, {"q": "How does early-stage research reduce planning risk?", "opts": ["Helps identify challenges early", "Improve social media likes and increase traffic", "Finalizes backdrop layout", "Boosts ticket design"], "ans": 0, "exp": "Nghiên cứu sớm phơi bày rủi ro khi chi phí sửa còn thấp — phát hiện muộn thì đã ký hợp đồng, khó quay đầu."}, {"q": "Which of the following best reflects a failure in feasibility screening?", "opts": ["Event is live-streamed without subtitles", "Venue is unavailable and lacks basic infrastructure", "Guests dislike the food", "Decor is not aligned with the event's theme"], "ans": 1, "exp": "Thất bại sàng lọc khả thi là khi địa điểm không sẵn sàng/thiếu hạ tầng cơ bản."}, {"q": "Which is a basic method of collecting primary data?", "opts": ["Reviewing books", "Conducting surveys", "Reading newspapers", "Watching ads"], "ans": 1, "exp": "Primary data = tự thu thập lần đầu: survey, phỏng vấn, quan sát. Đọc sách/báo/quảng cáo là secondary."}, {"q": "Which of the following is usually the first task when preparing a proposal for an event?", "opts": ["Send invitations to stakeholders, post media coverage", "Identifying stakeholders", "Booking the venue", "Clarifying the client's mission and values"], "ans": 3, "exp": "Trước khi lên bất kỳ đề xuất nào phải hiểu sứ mệnh & giá trị của khách hàng, nếu không đề xuất sẽ lệch hướng ngay từ gốc."}, {"q": "What is a potential outcome of skipping stakeholder screening in early planning?", "opts": ["Reduced venue fees", "Overestimating team strength", "Receiving too much sponsorship and publicity", "Failing to meet critical expectations"], "ans": 3, "exp": "Bỏ qua sàng lọc bên liên quan dễ dẫn tới không đáp ứng kỳ vọng then chốt."}, {"q": "What does a feasibility study assess?", "opts": ["Decoration options", "Project viability", "Name tags", "Seating comforts"], "ans": 1, "exp": "Feasibility study trả lời câu hỏi: dự án có khả thi không (ngân sách, nguồn lực, hạ tầng, pháp lý)."}, {"q": "A Gantt chart is mainly used for:", "opts": ["Lighting setup", "Food menu", "Scheduling tasks", "Invitations"], "ans": 2, "exp": "Gantt chart = biểu đồ thanh ngang theo thời gian, chỉ dùng để lên lịch và theo dõi tiến độ công việc."}, {"q": "What is the purpose of using benchmarking during research?", "opts": ["To promote sponsors and attract investment", "To compare best practices", "To select locations and infrastructure", "To find speakers"], "ans": 1, "exp": "Benchmarking = so sánh với chuẩn/thực tiễn tốt nhất của sự kiện tương tự để học và đặt mục tiêu."}, {"q": "Which type of data is collected directly from potential attendees?", "opts": ["Web articles", "Survey responses", "TV ads", "Blogs"], "ans": 1, "exp": "Phản hồi khảo sát đến trực tiếp từ khán giả tiềm năng — đó là primary data. Bài báo, quảng cáo TV, blog là nguồn gián tiếp."}, {"q": "In the SCAMPER model, asking \"What can be reversed?\" helps to:", "opts": ["Change project roles", "Identify a new venue", "Recalculate the event budget", "Explore creative alternatives"], "ans": 3, "exp": "SCAMPER (Substitute, Combine, Adapt, Modify, Put to other use, Eliminate, Reverse) là công cụ kích thích sáng tạo. Mọi câu hỏi SCAMPER đều dẫn về việc mở ra hướng đi mới."}, {"q": "What is a key component of a SWOT analysis?", "opts": ["Opportunities", "Sound checks", "Ticket design", "Stage location"], "ans": 0, "exp": "SWOT = Strengths, Weaknesses, Opportunities, Threats."}, {"q": "What is the first stage in the event planning process?", "opts": ["Planning", "Strategic intent", "Execution", "Evaluation"], "ans": 1, "exp": "Strategic intent đứng đầu — xác định vì sao làm sự kiện này. Chưa rõ mục đích thì chưa thể lập kế hoạch."}, {"q": "Which of the following is a key objective of event planning?", "opts": ["Selling tickets", "Achieving client goals", "Hiring performers", "Decorating venues"], "ans": 1, "exp": "Mọi hoạt động cuối cùng phục vụ mục tiêu của khách hàng. Bán vé, thuê nghệ sĩ chỉ là phương tiện."}, {"q": "What does the strategic intent phase help define?", "opts": ["Event budget", "Marketing tools", "Event venue", "Purpose and direction"], "ans": 3, "exp": "Strategic intent xác lập mục đích và định hướng — nền tảng để mọi quyết định sau bám vào."}, {"q": "Which factor influences the scale of an event?", "opts": ["Stage color", "Guest count", "Font style", "Hashtag used"], "ans": 1, "exp": "Quy mô sự kiện đo bằng số khách, kéo theo yêu cầu về venue, nhân sự, an toàn."}, {"q": "A key output of the planning phase is a:", "opts": ["Party theme", "Poster design", "Sound playlist", "Risk register"], "ans": 3, "exp": "Risk register (sổ đăng ký rủi ro) là đầu ra chuẩn của giai đoạn planning. Theme và poster thuộc khâu thiết kế/marketing."}, {"q": "A milestone in an event timeline is a:", "opts": ["Sponsor gift", "Critical checkpoint", "Music cue", "Seat number"], "ans": 1, "exp": "Milestone = mốc kiểm soát quan trọng trên timeline, ví dụ chốt venue, mở bán vé."}, {"q": "Why assess feasibility in event planning?", "opts": ["Sets extra seating", "Speeds up check-in", "Improves preparation quality and increase costs", "Confirms capacity to execute"], "ans": 3, "exp": "Đánh giá khả thi xác nhận đội ngũ có đủ năng lực, tiền và thời gian để thực hiện — đúng nghĩa \"làm được hay không\"."}, {"q": "What is a common limitation of secondary data?", "opts": ["Often outdated", "Too specific", "Very recent", "Not digitized"], "ans": 0, "exp": "Secondary data do người khác thu trước đó nên hay lỗi thời và không khớp bối cảnh hiện tại."}, {"q": "Why is stakeholder analysis important during concept development?", "opts": ["To adjust lights", "To set audio levels", "To measure seating and food ordering", "To identify key interests"], "ans": 3, "exp": "Phân tích stakeholder chỉ ra ai quan tâm điều gì, giúp concept dung hòa được các kỳ vọng then chốt."}, {"q": "What factor is typically analyzed during feasibility screening?", "opts": ["Dress code", "Event budget", "MC script", "All answers are wrong"], "ans": 1, "exp": "Feasibility screening luôn xét ngân sách — không đủ tiền thì mọi ý tưởng đều vô nghĩa. Dress code, kịch bản MC đến sau."}, {"q": "Why is defining certain criteria during event concept development?", "opts": ["To ensure clear direction", "To finalize budget", "To hire vendors", "For music selection"], "ans": 0, "exp": "Tiêu chí rõ ràng giữ concept đi đúng hướng, tránh mỗi người hiểu một kiểu."}, {"q": "How can audience demographics affect event planning decisions?", "opts": ["They determine who will be assigned as staff", "They influence location, timing, and content choices", "They ensure greater profits while increasing the cost of organizing", "They increase sponsorship demands"], "ans": 1, "exp": "Nhân khẩu học chi phối lựa chọn địa điểm, thời gian và nội dung."}, {"q": "An example of a demand factor in events is:", "opts": ["Audience interest", "Lighting brand", "Poster font", "Ticket color"], "ans": 0, "exp": "Demand factor = yếu tố tạo ra nhu cầu. Sự quan tâm của khán giả chính là cầu; font chữ, màu vé thì không."}, {"q": "Primary reason for conducting event research?", "opts": ["To create marketing posters", "To inform planning decisions", "To order catering early", "To book performers"], "ans": 1, "exp": "Nghiên cứu tồn tại để ra quyết định dựa trên dữ liệu thay vì cảm tính."}, {"q": "What does feasibility screening determine?", "opts": ["Stage height", "Whether the event can proceed", "Food supplier", "Lighting system"], "ans": 1, "exp": "Feasibility screening chốt một điều: sự kiện có được phép tiến hành tiếp hay dừng lại."}, {"q": "Which document outlines the initial event concept?", "opts": ["Feasibility report", "Evaluation checklist", "Concept proposal", "Vendor contract"], "ans": 2, "exp": "Concept proposal là tài liệu trình bày ý tưởng ban đầu. Feasibility report đánh giá tính khả thi, đến sau."}, {"q": "What is a secondary source of data?", "opts": ["Interviewing guests", "Surveying attendees", "Reading government reports", "Measuring stage size"], "ans": 2, "exp": "Báo cáo chính phủ do bên khác thu thập và công bố → secondary. Phỏng vấn và khảo sát là primary."}, {"q": "Role of concept testing in event planning?", "opts": ["Secures sponsors", "Manages ticket sales", "Determines speaker lineup", "Assesses appeal of an idea"], "ans": 3, "exp": "Concept testing đo mức hấp dẫn của ý tưởng với khán giả trước khi đầu tư lớn."}, {"q": "Factor analyzed during feasibility screening?", "opts": ["Dress code", "Event poster", "MC script", "All answers are wrong"], "ans": 3, "exp": "Cả ba phương án (dress code, poster, kịch bản MC) đều là chi tiết thực thi, không thuộc sàng lọc khả thi → chọn \"All answers are wrong\"."}]}, {"title": "Module 2 — Địa điểm & Quy hoạch mặt bằng", "desc": "Chọn & khảo sát địa điểm, hợp đồng thuê, khả năng tiếp cận (ADA), sơ đồ mặt bằng, luồng di chuyển & an toàn.", "qs": [{"q": "Which of the following best describes a benefit of conducting a site visit before the event?", "opts": ["It allows sponsors to test their displays", "It replaces the need for an event manual", "It helps identify layout issues in advance", "It reduces the total cost of the event"], "ans": 2, "exp": "Đến tận nơi mới thấy được cột chắn tầm nhìn, cửa hẹp, ổ điện thiếu — những lỗi layout mà bản vẽ không lộ ra."}, {"q": "An event team is considering two venues: -Venue A: City center location, limited parking, high rental fee. - Venue B: Suburban location, large parking area, moderate rental fee, but 45 minutes from most hotels. If the event is a trade show expecting many visitors to bring products and equipment, which venue is more suitable?", "opts": ["Venue A, because it's in the city center", "Venue B, because it offers easier logistics for exhibitors", "Venue A, because it reduces travel time for hotel guests", "Venue B, because it is cheaper"], "ans": 1, "exp": "Chọn địa điểm dễ logistics cho khách mang thiết bị/sản phẩm (bãi đỗ lớn) hơn vị trí trung tâm."}, {"q": "Which is the most important pre-event check for outdoor events?", "opts": ["Weather forecast", "Number of guests", "Catering menu", "VIP list"], "ans": 0, "exp": "Sự kiện ngoài trời phụ thuộc hoàn toàn vào thời tiết; mọi thứ khác đều có thể xoay sở, mưa bão thì không."}, {"q": "Which venue type typically offers in-house catering?", "opts": ["Hotel ballroom", "Public park", "Empty warehouse", "Sports field"], "ans": 0, "exp": "Ballroom khách sạn có bếp và đội F&B sẵn. Công viên, nhà kho, sân bóng phải thuê catering ngoài."}, {"q": "What is the purpose of a walk-through with the venue manager?", "opts": ["Confirm arrangements and logistics", "Book décor", "Test catering", "Train staff"], "ans": 0, "exp": "Walk-through cùng quản lý venue để xác nhận lại từng thoả thuận và luồng logistics trước ngày diễn."}, {"q": "Which step comes after shortlisting venues?", "opts": ["Conduct site visits", "Book catering", "Contract signing", "Design décor"], "ans": 0, "exp": "Quy trình: xác định yêu cầu → lập shortlist → **khảo sát thực địa** → đàm phán → ký hợp đồng. Ký trước khi đi xem là sai lầm."}, {"q": "What does ADA compliance refer to in venue selection?", "opts": ["Adequate parking area", "Availability of alcohol", "Advanced decoration arrangements", "Accessibility for disabled persons"], "ans": 3, "exp": "ADA = Americans with Disabilities Act — quy định về khả năng tiếp cận cho người khuyết tật (dốc, thang máy, nhà vệ sinh, chỗ ngồi)."}, {"q": "Which site planning element ensures smooth crowd flow?", "opts": ["Layout and zoning", "Menu design", "Theme colours", "Stage lighting"], "ans": 0, "exp": "Layout và phân khu quyết định người di chuyển thế nào. Menu, màu chủ đề, ánh sáng không ảnh hưởng luồng đi."}, {"q": "Which document outlines venue safety measures?", "opts": ["Menu", "Invitation stakeholder letter", "Risk assessment report", "Budget sheet"], "ans": 2, "exp": "Risk assessment report liệt kê mối nguy tại địa điểm và biện pháp kiểm soát."}, {"q": "Why is crowd flow important?", "opts": ["Prevents congestion and improves safety", "Helps reduce event budgets", "Reduces event attendance", "Provides a reason to increase event admission prices, limiting overcrowding"], "ans": 0, "exp": "Luồng di chuyển tốt ngăn ùn ứ, tránh giẫm đạp và bảo đảm lối thoát hiểm thông suốt."}, {"q": "Why is insurance important for venues?", "opts": ["Increases attendance", "Covers liability and damage", "Helps prevent all risks", "Reduces catering cost"], "ans": 1, "exp": "Bảo hiểm chuyển rủi ro tài chính khi có thiệt hại tài sản hoặc khiếu nại trách nhiệm. Nó bồi thường chứ không ngăn được rủi ro xảy ra."}, {"q": "Which venue type is most suitable for hybrid events?", "opts": ["Small restaurant", "Open field", "Hotel with conference facilities", "All answers are correct"], "ans": 2, "exp": "Hybrid cần hạ tầng hội nghị: internet mạnh, phòng điều khiển, thiết bị AV — khách sạn có conference facilities đáp ứng đủ."}, {"q": "Why is accessibility a legal requirement?", "opts": ["To comply with disability laws", "To increase décor impact", "To save money", "To improve sound"], "ans": 0, "exp": "Luật chống phân biệt đối xử với người khuyết tật buộc địa điểm phải tiếp cận được. Đây là nghĩa vụ pháp lý, không phải lựa chọn."}, {"q": "Which factor impacts both budget and audience experience?", "opts": ["Logo design", "Venue location", "Invitation font", "Hashtag choice"], "ans": 1, "exp": "Vị trí venue vừa quyết định giá thuê vừa quyết định khách có đến dễ không — chạm cả hai đầu."}, {"q": "What is the first step in venue selection?", "opts": ["Book entertainment", "Identify event requirements", "Sign a contract to rent the venue", "Send invitations"], "ans": 1, "exp": "Bước đầu chọn địa điểm là xác định yêu cầu sự kiện, rồi mới tìm và ký."}, {"q": "Which venue type is best for large-scale outdoor festivals?", "opts": ["Convention center", "Ballroom", "Stadium", "Meeting room"], "ans": 2, "exp": "Sân vận động có sức chứa lớn, không gian mở, hạ tầng an ninh và vệ sinh sẵn cho festival quy mô lớn."}, {"q": "Which of these is part of site planning?", "opts": ["Food & Beverage", "Finance & Budget", "Fun & Benefits", "Facilities & Booking"], "ans": 3, "exp": "Site planning xoay quanh cơ sở vật chất và việc đặt chỗ (Facilities & Booking). F&B và tài chính thuộc mảng khác."}, {"q": "What is one key consideration when selecting a venue?", "opts": ["Its alignment with the event's image and accessibility", "How much profit it has made before", "Does the venue offer free streaming services"], "ans": 0, "exp": "Venue phải hợp với hình ảnh sự kiện và khách phải tới được. Lợi nhuận quá khứ của venue không liên quan."}, {"q": "What does a floor plan help with?", "opts": ["Understanding layout and capacity", "Develop a marketing strategy", "Develop a ticket pricing strategy", "Setup stage lighting"], "ans": 0, "exp": "Floor plan cho biết bố trí và sức chứa thực tế — kê bao nhiêu bàn, lối đi rộng bao nhiêu."}, {"q": "Most important factor when selecting a venue?", "opts": ["Menu", "Ticket price", "Location", "Dress code"], "ans": 2, "exp": "Vị trí là yếu tố quyết định nhất: sai vị trí thì khách không đến, mọi thứ khác thành vô nghĩa."}, {"q": "Main purpose of a venue contract?", "opts": ["Outline terms and conditions", "Design stage", "Provide event ideas and themes", "Send invitations"], "ans": 0, "exp": "Hợp đồng venue quy định điều khoản: giá, thời gian, huỷ, trách nhiệm, phạt hư hỏng."}, {"q": "What is a site inspection?", "opts": ["Designing event decor", "Visiting a venue to assess suitability", "Negotiate and sign lease agreement", "Calculating ticket sales"], "ans": 1, "exp": "Site inspection = đến khảo sát để đánh giá địa điểm có phù hợp không. Khác với đàm phán hay ký kết."}, {"q": "Which aspect of location affects attendee convenience most?", "opts": ["Proximity to transport links", "Decor", "Lighting", "All answers are correct"], "ans": 0, "exp": "Gần đầu mối giao thông là yếu tố tiện lợi nhất — khách đến bằng gì và mất bao lâu."}]}, {"title": "Module 3 — Sản xuất, Chương trình & Thiết kế trải nghiệm", "desc": "Lịch sản xuất, AV/ánh sáng, dàn dựng, mô hình trải nghiệm (Pine & Gilmore, Carù & Cova), theming & tổng duyệt.", "qs": [{"q": "What does AV stand for in event production?", "opts": ["All Volunteers", "Advanced Venue", "Average Value", "Audio Visual"], "ans": 3, "exp": "AV = Audio Visual: âm thanh, hình ảnh, màn chiếu, micro."}, {"q": "What is an example of memorabilia in modern events?", "opts": ["Social media shareable moments", "Plastic souvenirs", "Free T-shirts", "Discount coupons"], "ans": 0, "exp": "Memorabilia hiện đại là khoảnh khắc chia sẻ được lên mạng xã hội — vừa là kỷ niệm cho khách vừa là marketing lan truyền."}, {"q": "What is the primary goal of load-in planning?", "opts": ["Efficient setup", "Increase décor", "Lower ticket price", "Reduce catering"], "ans": 0, "exp": "Load-in nhắm tới việc dựng nhanh gọn, đúng thứ tự, không tắc nghẽn xe và thiết bị."}, {"q": "In sensory immersion, which sense is NOT typically engaged?", "opts": ["Sight", "Smell", "Taste", "Time"], "ans": 3, "exp": "Trải nghiệm giác quan dùng thị, thính, khứu, vị, xúc giác. Thời gian không phải một giác quan."}, {"q": "What is the final phase of Carù and Cova's model?", "opts": ["Investigation", "Nesting", "Stamping", "Downtime"], "ans": 2, "exp": "Mô hình Carù & Cova: Nesting → Investigation → **Stamping**. Stamping là giai đoạn cuối, khi khách đóng dấu trải nghiệm thành của riêng mình."}, {"q": "Which element can be central or part of a wider event offering?", "opts": ["Entertainment", "Budgeting", "Insurance", "Security"], "ans": 0, "exp": "Giải trí có thể là trung tâm (concert) hoặc chỉ là phần phụ trợ (tiệc gala có ban nhạc nền)."}, {"q": "Which of the following is an example of an event element?", "opts": ["Venue", "Ticket price", "Weather forecast", "Attendee age"], "ans": 0, "exp": "Venue là một event element cơ bản, cùng với chương trình, F&B, giải trí, trang trí."}, {"q": "According to Pine & Gilmore, which is NOT one of the five rules for experience design?", "opts": ["Make it immersive", "Eliminate negative cues", "Mix in memorabilia", "Lower ticket prices"], "ans": 3, "exp": "Pine & Gilmore bàn về thiết kế trải nghiệm — chủ đề, dấu hiệu tích cực, loại bỏ dấu hiệu tiêu cực, memorabilia, giác quan. Giảm giá vé là chiến thuật giá, không nằm trong đó."}, {"q": "Which programming stage involves freedom for attendees to explore the event space?", "opts": ["Welcome/Nesting", "Build", "Peak", "Ending"], "ans": 1, "exp": "Giai đoạn Build cho khách tự do khám phá không gian sau khi đã được đón và định vị."}, {"q": "You are planning a music festival and need to coordinate stage setup, lighting, and security. Which is the most effective first step in the production process?", "opts": ["Start advertising ticket sales", "Create a detailed production schedule and checklist", "Recruit volunteers and experienced staff for the day of the event", "Order catering services"], "ans": 1, "exp": "Việc phối hợp nhiều bộ phận luôn bắt đầu bằng production schedule và checklist — không có nó thì sân khấu, ánh sáng, an ninh giẫm chân nhau."}, {"q": "What is the benefit of a detailed production schedule?", "opts": ["Reduces catering", "Improves décor", "Avoids conflicts and delays", "Increases ticket prices"], "ans": 2, "exp": "Lịch sản xuất chi tiết cho biết ai làm gì lúc nào, nhờ đó không đụng độ tài nguyên và không trễ dây chuyền."}, {"q": "Why is AV testing important before an event?", "opts": ["Improves catering", "Changes decoration cost", "Prevents technical failures", "Changes menu"], "ans": 2, "exp": "Test AV trước để lỗi lộ ra khi còn sửa được. Trục trặc micro giữa buổi thì không cứu vãn nổi."}, {"q": "Which factor is key in creating a sense of community at events?", "opts": ["Ticket price", "Belonging", "Weather", "Transport"], "ans": 1, "exp": "Cảm giác thuộc về (belonging) là hạt nhân tạo cộng đồng — khách thấy mình là một phần của nhóm."}, {"q": "Which stage in event programming focuses on orientation and arrival?", "opts": ["Welcome/Nesting", "Build", "Peak", "Ending"], "ans": 0, "exp": "Welcome/Nesting là giai đoạn đón khách, giúp họ định vị và cảm thấy an toàn trong không gian mới."}, {"q": "Which theming type focuses on a single problem or idea?", "opts": ["Overlaid story", "Topic theme", "Visual theming", "Hospitality"], "ans": 1, "exp": "Topic theme xoay quanh một vấn đề hoặc ý tưởng duy nhất, khác với theme theo phong cách hay thời kỳ."}, {"q": "Which type of lighting is used for highlighting speakers?", "opts": ["LED wall", "Ambient light", "Floodlight", "Spotlight"], "ans": 3, "exp": "Spotlight tập trung chùm sáng hẹp vào diễn giả, tách họ khỏi nền."}, {"q": "Which best explains the role of an event programmer?", "opts": ["To promote the event on TV", "To confirm vendor payments", "To structure the flow of sessions and activities", "To serve as the catering checklist"], "ans": 2, "exp": "Event programmer sắp xếp dòng chảy các phiên và hoạt động — nhịp độ, thứ tự, thời lượng."}, {"q": "Which event element affects mood using lighting?", "opts": ["Speakers", "Hospitality", "Budget and costs of organization", "Special effects and decor"], "ans": 3, "exp": "Ánh sáng thuộc nhóm hiệu ứng đặc biệt và trang trí, công cụ chính để điều khiển cảm xúc không gian."}, {"q": "Main purpose of hospitality in events?", "opts": ["To welcome and care for attendees", "To set ticket prices and arrange event insurance", "To design lighting", "All answers are correct"], "ans": 0, "exp": "Hospitality là việc đón tiếp và chăm sóc khách, từ lúc họ tới đến lúc ra về."}, {"q": "What is the main purpose of a rehearsal?", "opts": ["Test run of the event program", "Selling tickets", "Setting budget", "Proposing communication plan"], "ans": 0, "exp": "Rehearsal là chạy thử toàn chương trình để phát hiện lỗi kịch bản, chuyển cảnh, kỹ thuật."}, {"q": "Which document outlines the event schedule?", "opts": ["Invoice", "Production schedule", "Contract Agreement", "Budget"], "ans": 1, "exp": "Production schedule là tài liệu ghi lịch trình sản xuất và vận hành sự kiện."}, {"q": "What is the best approach to staffing event tasks?", "opts": ["Hire one person to do all tasks", "Assign separate staff for each task", "Only hire staff for registration", "Let volunteers handle everything without training"], "ans": 1, "exp": "Mỗi đầu việc nên có người chuyên trách để trách nhiệm rõ ràng, không ai bị quá tải giữa lúc cao điểm."}]}, {"title": "Module 4 — Nhân sự, Vai trò & Quản trị con người", "desc": "Vai trò từng vị trí, HR, đa dạng nhân sự, xếp ca/rota, tình nguyện viên, phối hợp liên bộ phận, an toàn & PPE.", "qs": [{"q": "Which staff handles technical equipment?", "opts": ["Security", "Chef", "AV technician", "Usher"], "ans": 2, "exp": "AV technician phụ trách âm thanh, ánh sáng, màn hình, thiết bị kỹ thuật."}, {"q": "Why is diversity important in staffing?", "opts": ["To hire at a lower cost", "Brings varied skills and perspectives", "To avoid mistakes when organizing events", "All answers are correct"], "ans": 1, "exp": "Đội ngũ đa dạng mang nhiều kỹ năng và góc nhìn, xử lý được nhiều tình huống và nhiều nhóm khách hơn."}, {"q": "Why is interdepartmental coordination vital?", "opts": ["Ensures smooth overall operations", "Interdepartmental coordination is unnecessary", "It's only necessary when organizing large events", "All answers are correct"], "ans": 0, "exp": "Phối hợp liên bộ phận giữ cho an ninh, hậu cần, F&B, kỹ thuật chạy khớp nhau — thiếu nó là chỉ dẫn mâu thuẫn."}, {"q": "What does HR stand for?", "opts": ["High Risk", "Human Resources", "House Rules", "Heavy Rotation"], "ans": 1, "exp": "HR = Human Resources, quản trị nguồn nhân lực."}, {"q": "What is a break rota used for?", "opts": ["Scheduling staff breaks", "Ticket sales", "Budgeting", "Marketing"], "ans": 0, "exp": "Break rota là lịch phân ca nghỉ, bảo đảm luôn có người trực khi đồng nghiệp nghỉ."}, {"q": "After the event, security and catering teams report that they received conflicting instructions during peak hours. How should you address this for future events? (Select all that apply)", "opts": ["Have the security team remove those involved in the conflict from the event area", "Reduce the number of instructions given during events", "Review and streamline communication protocols between departments", "Assign all functions to one department"], "ans": 1, "exp": "Chuẩn hóa và giảm bớt luồng chỉ đạo giữa các bộ phận để tránh mâu thuẫn khi cao điểm."}, {"q": "Which role ensures safety compliance at an event?", "opts": ["Catering manager", "Marketing manager", "Health and safety officer", "Ticket inspector at the gate"], "ans": 2, "exp": "Health and safety officer giám sát tuân thủ an toàn tại sự kiện."}, {"q": "Which team is responsible for crowd control?", "opts": ["Technical team", "Catering team", "Marketing team", "Security team"], "ans": 3, "exp": "Đội an ninh phụ trách kiểm soát đám đông, lối vào ra và xử lý tình huống."}, {"q": "You have two candidates for the same role. One has more experience, the other has better customer service skills. The role is front-of-house guest service. Who should you hire?", "opts": ["The more experienced candidate, regardless of soft skills", "The candidate with strong customer service skills", "Neither candidate, reopen recruitment", "Hire both for the same shift"], "ans": 1, "exp": "Ưu tiên kỹ năng phù hợp vị trí: đón tiếp khách cần kỹ năng dịch vụ hơn là thâm niên."}, {"q": "What is the role of a supplier briefing?", "opts": ["Increases ticket price", "Negotiate service discounts, increase quality", "Changes catering", "Aligns expectations and requirements"], "ans": 3, "exp": "Supplier briefing đồng bộ kỳ vọng và yêu cầu với nhà cung cấp trước khi họ vào việc."}, {"q": "What is the role of a front-of-house manager?", "opts": ["Oversee guest services", "Design décor", "Cook meals", "Sell tickets"], "ans": 0, "exp": "Front-of-house manager quản lý toàn bộ khu vực tiếp xúc khách: đón tiếp, chỗ ngồi, dịch vụ."}, {"q": "Which document outlines staff responsibilities?", "opts": ["Job description", "Invoice", "Menu", "Ticket"], "ans": 0, "exp": "Job description mô tả trách nhiệm và phạm vi công việc của từng vị trí."}, {"q": "Why should volunteers be briefed before the event?", "opts": ["Clarifies duties and expectations", "Improves décor", "Reduces catering", "Changes venue"], "ans": 0, "exp": "Brief tình nguyện viên trước để họ hiểu rõ nhiệm vụ và giới hạn — họ thường thiếu kinh nghiệm sự kiện."}, {"q": "Two staff members scheduled for the same shift both request last-minute leave. What should you do first?", "opts": ["Cancel that part of the event", "Find replacements from trained backup staff", "Ignore their requests", "Ask attendees to perform the task themselves"], "ans": 1, "exp": "Tìm nhân sự dự phòng đã được huấn luyện để thay ca."}, {"q": "Two departments are giving conflicting instructions to staff. What should HR do?", "opts": ["Ignore it", "Let each department manage their own staff without coordination", "Arrange a quick meeting to align responsibilities", "Choose one department's instructions and ignore the other"], "ans": 2, "exp": "Họp nhanh để thống nhất lại trách nhiệm giữa các bộ phận."}, {"q": "After the event, some staff report poor shift scheduling. What is the best next step?", "opts": ["Review scheduling processes and adjust for future events", "Tell staff to accept the schedule as it is", "Reduce the number of staff for the next event", "All answers are correct"], "ans": 0, "exp": "Rà soát quy trình xếp ca và điều chỉnh cho các sự kiện sau."}, {"q": "Which tool best supports real-time staff coordination during an event?", "opts": ["Email", "Two-way radios", "Social media", "Public announcement"], "ans": 1, "exp": "Bộ đàm hai chiều cho liên lạc tức thì, không phụ thuộc sóng điện thoại hay wifi quá tải."}, {"q": "Lighting technician is sick on event day. What should you do?", "opts": ["Cancel event", "Call backup technician", "Operate equipment untrained", "Remove lighting"], "ans": 1, "exp": "Gọi kỹ thuật viên dự phòng để đảm bảo sự kiện không gián đoạn."}, {"q": "One staff receives repeated complaints. What is the first step?", "opts": ["Fire immediately", "Discuss privately and coach", "Criticize publicly", "Ignore issue"], "ans": 1, "exp": "Trao đổi riêng và huấn luyện nhân viên trước khi xử lý nặng hơn."}, {"q": "What is cross-training?", "opts": ["Selling tickets", "Changing décor", "Menu planning", "Training staff for multiple roles"], "ans": 3, "exp": "Cross-training là đào tạo nhân sự làm được nhiều vai trò, giúp có người thay thế khi thiếu hụt."}, {"q": "Why should staff wear PPE?", "opts": ["Personal Protective Equipment", "Public Performance Event", "Private Party Event", "Professional Planning Exercise"], "ans": 0, "exp": "PPE = Personal Protective Equipment: mũ bảo hộ, giày, găng tay, áo phản quang."}, {"q": "What is the role of a stage manager?", "opts": ["Oversees stage operations", "Sets ticket prices", "Manages catering", "None are correct"], "ans": 0, "exp": "Stage manager điều hành mọi hoạt động trên và quanh sân khấu, gọi cue cho từng tiết mục."}, {"q": "Who is responsible for coordinating event tasks?", "opts": ["Security guard", "Chef", "Janitor", "Event manager"], "ans": 3, "exp": "Event manager là người điều phối tổng thể các đầu việc và các bộ phận."}, {"q": "Which role oversees stage activities?", "opts": ["Security guard", "Chef", "Stage manager", "Graphic designer"], "ans": 2, "exp": "Stage manager giám sát hoạt động sân khấu — trùng ý với câu về vai trò stage manager ở trên."}, {"q": "What is a rota?", "opts": ["Communication plan", "Budget report", "Ticket list", "Staff work schedule"], "ans": 3, "exp": "Rota = bảng phân ca làm việc của nhân sự."}, {"q": "Which type of staff works without pay?", "opts": ["Managers", "Contractors", "Volunteers", "Technicians"], "ans": 2, "exp": "Volunteer là người làm không lương, thường đổi lấy trải nghiệm hoặc quyền lợi khác."}, {"q": "Volunteer arrives late and misses briefing. Best response?", "opts": ["Send them home immediately", "Brief them quickly on essential duties before starting work", "Let them figure it out by themselves", "Assign them to a random task"], "ans": 1, "exp": "Brief nhanh nhiệm vụ cốt lõi trước khi cho tình nguyện viên vào việc."}, {"q": "Role monitoring safety compliance during event?", "opts": ["Safety officer", "Marketing manager", "Chef", "Ticket clerk"], "ans": 0, "exp": "Safety officer theo dõi việc tuân thủ an toàn trong suốt sự kiện."}]}, {"title": "Module 5 — Marketing, Tài chính & Mua sắm", "desc": "Marketing mix & kênh truyền thông, giá vé, ngân sách, chi phí cố định/biến đổi, mua sắm & hợp đồng nhà cung cấp, ROI.", "qs": [{"q": "After the event, a supplier claims unpaid overtime fees you didn't agree on. What should you do?", "opts": ["Pay them immediately to resolve the issue quickly", "Ban them from future events", "Ignore them", "Review the signed contract before paying"], "ans": 3, "exp": "Đối chiếu hợp đồng đã ký trước khi trả — chỉ thanh toán những gì đã cam kết bằng văn bản."}, {"q": "The stage hire contract includes high damage fees. What should you do before signing?", "opts": ["Negotiate lower fees", "Remove staging needs", "Ignore the clause", "Sign quickly"], "ans": 0, "exp": "Thương lượng giảm phí trước khi ký; đừng bỏ qua điều khoản rủi ro tài chính."}, {"q": "Ticket sales peaked right after a radio ad campaign. How should you present this?", "opts": ["In a chart showing sales vs. advertising dates", "In an unrelated catering report", "As random text notes", "Without mentioning the campaign"], "ans": 0, "exp": "Dùng biểu đồ đối chiếu doanh số với mốc quảng cáo để thể hiện quan hệ nhân–quả."}, {"q": "What does ROI stand for?", "opts": ["Revenue on invoices", "Rate of income", "Return on Investment", "Record of Items"], "ans": 2, "exp": "ROI = Return on Investment — lợi nhuận thu về trên chi phí bỏ ra."}, {"q": "Your festival is competing with two similar local events. How can you differentiate your brand?", "opts": ["Lower ticket prices without changing content", "Highlight unique features like eco-friendly initiatives or exclusive performances", "Use the same marketing materials as competitors", "Reduce marketing to avoid comparison"], "ans": 1, "exp": "Tạo khác biệt bằng điểm độc đáo (ví dụ yếu tố xanh, tiết mục độc quyền)."}, {"q": "Why is email marketing still effective?", "opts": ["Direct access to interested people", "More expensive than print and cheaper than official channel", "Better than all ads", "No cost at all"], "ans": 0, "exp": "Email tiếp cận thẳng người đã chủ động đăng ký — họ vốn quan tâm, nên tỷ lệ chuyển đổi cao và chi phí thấp."}, {"q": "Which procurement method seeks multiple supplier bids?", "opts": ["Competitive bidding", "Direct purchase", "Single sourcing", "Spot buying"], "ans": 0, "exp": "Competitive bidding mời nhiều nhà cung cấp cùng báo giá để so sánh giá và chất lượng."}, {"q": "Why is it advised not to rely solely on one method of event marketing?", "opts": ["It becomes too difficult to track results", "It may not reach all target audiences effectively", "It violates industry advertising rules and regulations", "It leads to audience confusion"], "ans": 1, "exp": "Không kênh nào phủ hết mọi nhóm khán giả; chỉ dùng một kênh là bỏ sót phần lớn thị trường."}, {"q": "What is lifecycle costing in events?", "opts": ["Assessing total cost over event duration", "Media costs", "Human resource mobilization costs", "Costs exceeding budget"], "ans": 0, "exp": "Lifecycle costing tính tổng chi phí trong suốt vòng đời sự kiện, không chỉ giá mua ban đầu."}, {"q": "Which KPI measures ticket purchases after ad clicks?", "opts": ["Reach", "Conversion rate", "Engagement", "Bounce rate"], "ans": 1, "exp": "Conversion rate = tỷ lệ người click quảng cáo rồi thực sự mua vé."}, {"q": "Which of the following is a key element of the marketing mix?", "opts": ["Decor", "Lighting", "Security", "Price"], "ans": 3, "exp": "Marketing mix 4P: Product, **Price**, Place, Promotion."}, {"q": "Which channel is best for reaching older demographics?", "opts": ["Snapchat", "TikTok", "Print media", "Instagram"], "ans": 2, "exp": "Nhóm khán giả lớn tuổi tiếp cận báo in, tạp chí, tờ rơi tốt hơn mạng xã hội."}, {"q": "Which term describes offering special prices to early bookers?", "opts": ["Flash sale", "Loyalty bonus", "Early bird discount", "Package deal"], "ans": 2, "exp": "Early bird discount là giá ưu đãi cho người đặt sớm, giúp thu tiền mặt sớm và đo được sức cầu."}, {"q": "Which document estimates future income and expenses?", "opts": ["Budget", "Invoice", "Receipt", "Contract"], "ans": 0, "exp": "Budget là bản dự toán thu chi trong tương lai."}, {"q": "What is a contingency fund?", "opts": ["Sponsorship income", "Main event budget", "Reserve money for emergencies", "Ticket revenue"], "ans": 2, "exp": "Contingency fund là khoản dự phòng cho tình huống bất ngờ, thường 5–10% tổng ngân sách."}, {"q": "Which document is issued to request payment?", "opts": ["Purchase order", "Contract", "Budget", "Invoice"], "ans": 3, "exp": "Invoice là hoá đơn yêu cầu thanh toán do nhà cung cấp phát hành."}, {"q": "A supplier offers 20% off for full payment now, months before delivery. What should you check first?", "opts": ["Supplier's social media", "Competitor prices", "Your available cash flow", "Event date flexibility"], "ans": 2, "exp": "Kiểm tra dòng tiền khả dụng trước khi trả sớm để hưởng chiết khấu."}, {"q": "What type of event often aims to generate media attention?", "opts": ["Press launch", "Private party", "Family reunion", "Wedding"], "ans": 0, "exp": "Press launch được tổ chức chính để thu hút truyền thông và đưa tin."}, {"q": "Three staging bids: cheap with poor reviews, mid-price with good reviews, expensive famous. Best choice?", "opts": ["Cheapest", "Mid-priced with good reviews", "Most expensive", "Wait to decide"], "ans": 1, "exp": "Chọn nhà thầu tầm trung có đánh giá tốt — cân bằng chi phí và độ tin cậy."}, {"q": "Which financial document summarises income and expenses?", "opts": ["Income statement", "Purchase order", "Invoice", "Budget"], "ans": 0, "exp": "Income statement tổng kết doanh thu và chi phí, cho biết lãi lỗ. Budget là dự toán trước, income statement là kết quả sau."}, {"q": "What is the advantage of multi-year supplier contracts?", "opts": ["Stable pricing", "Better décor", "Faster setup", "Higher ticket price"], "ans": 0, "exp": "Hợp đồng nhiều năm khoá được giá, tránh biến động và giúp dự toán chính xác hơn."}, {"q": "Supplier offers 20% discount for early full payment. What should you check first?", "opts": ["Supplier's social media", "Competitor prices", "Your available cash flow", "Event date flexibility"], "ans": 2, "exp": "Kiểm tra dòng tiền khả dụng trước khi trả trước để hưởng chiết khấu."}, {"q": "Which type of cost changes with attendance numbers?", "opts": ["Hidden cost", "Fixed cost", "Capital cost", "Variable cost"], "ans": 3, "exp": "Variable cost biến động theo số khách: suất ăn, quà tặng, tài liệu. Fixed cost thì không."}, {"q": "Why are influencer partnerships valuable for events?", "opts": ["Reach niche audiences", "Reduce catering cost", "Manage security", "Handle ticketing"], "ans": 0, "exp": "Influencer đưa sự kiện đến đúng cộng đồng ngách với độ tin cậy sẵn có."}, {"q": "What does A/B testing involve?", "opts": ["Comparing two versions to see which performs better", "Sending one version to everyone", "Testing catering quality", "Changing the event date"], "ans": 0, "exp": "A/B testing chạy song song hai phiên bản để xem cái nào cho kết quả tốt hơn."}, {"q": "Which marketing channel uses Facebook and Instagram?", "opts": ["Direct mail", "Print advertising", "Social media marketing", "Telemarketing"], "ans": 2, "exp": "Facebook và Instagram thuộc social media marketing."}, {"q": "Which metric measures how many people saw your ad?", "opts": ["Conversion", "Click-through rate", "Reach", "Engagement"], "ans": 2, "exp": "Reach đo số người đã nhìn thấy quảng cáo. Khác với impression (số lần hiển thị) và conversion (số người mua)."}, {"q": "Most important factor in choosing a marketing channel?", "opts": ["Where your audience spends time", "Cost of venue", "Menu options", "Staff uniforms"], "ans": 0, "exp": "Chọn kênh theo nơi khán giả mục tiêu dành thời gian, không theo kênh nào rẻ hay đang thời thượng."}, {"q": "Example of offline marketing?", "opts": ["Instagram story", "Email newsletter", "Newspaper advertisement", "Search engine ad"], "ans": 2, "exp": "Quảng cáo báo giấy là kênh offline. Email, mạng xã hội, website là online."}, {"q": "Example of fixed cost?", "opts": ["Advertising", "Catering", "Staff overtime", "Venue rental"], "ans": 3, "exp": "Tiền thuê venue không đổi dù có 100 hay 500 khách → fixed cost."}, {"q": "What is procurement?", "opts": ["Promoting an event", "Designing a logo", "Acquiring goods and services", "Hiring staff"], "ans": 2, "exp": "Procurement là quá trình mua sắm hàng hoá và dịch vụ, gồm tìm nguồn, đàm phán, ký hợp đồng."}, {"q": "Marketing overspent but AV under budget. Best step?", "opts": ["Cancel AV", "Reallocate the surplus", "Ask for more sponsorship", "Ignore the difference"], "ans": 1, "exp": "Điều chuyển phần dư ngân sách AV sang bù cho marketing."}, {"q": "Which term refers to money going out of a business?", "opts": ["Asset", "Revenue", "Profit", "Expenditure"], "ans": 3, "exp": "Expenditure là dòng tiền chi ra. Income/revenue là tiền vào."}, {"q": "Purpose of a budget in event planning?", "opts": ["To set ticket prices", "To design décor", "To control costs", "To hire staff"], "ans": 2, "exp": "Ngân sách tồn tại để kiểm soát chi phí, phát hiện sớm khi có khoản vượt dự toán."}, {"q": "Catering costs exceed budget by 30%. First step?", "opts": ["Reduce menu items and renegotiate", "Remove catering entirely", "Delay payment until after the event", "Ignore and hope sales cover it"], "ans": 0, "exp": "Giảm bớt món và thương lượng lại khi chi phí ăn uống vượt 30%."}]}, {"title": "Module 6 — Vận hành ngày sự kiện & Quản trị rủi ro", "desc": "Triển khai tại chỗ, xử lý sự cố, kế hoạch dự phòng, an toàn/sơ tán, logistics & giám sát thời gian thực ngày diễn ra.", "qs": [{"q": "A VIP speaker's flight is delayed, and they will miss their scheduled time slot. What should you do?", "opts": ["Cancel their session entirely", "Rearrange the program to fit them in later", "Replace them with a filler activity without informing attendees", "End the event earlier than planned"], "ans": 1, "exp": "Linh hoạt xếp lại chương trình để vẫn giữ diễn giả, thay vì hủy phiên."}, {"q": "Which document lists key contacts for the event day?", "opts": ["Floor plan", "Invoice", "Contact sheet", "Budget sheet"], "ans": 2, "exp": "Contact sheet liệt kê số liên lạc của từng đầu mối trong ngày diễn ra — thứ cần nhất khi có sự cố."}, {"q": "A VIP guest arrives early before the registration desk is ready. What's the best action?", "opts": ["Escort them to a waiting area with refreshments", "Ask them to wait outside and ignore them until ready", "Let them wander", "All answers are correct"], "ans": 0, "exp": "Đưa khách VIP tới khu chờ có phục vụ nhẹ trong lúc chuẩn bị bàn đăng ký."}, {"q": "Decor suppliers are delivering more than ordered, increasing costs. What should you do?", "opts": ["Accept and pay", "Refuse excess items", "Store extras for later", "Donate them"], "ans": 1, "exp": "Từ chối nhận hàng vượt đơn để kiểm soát chi phí; chỉ nhận đúng số đã đặt."}, {"q": "Who should lead emergency evacuation?", "opts": ["Trained safety officers", "Event manager only", "Any staff", "Volunteers"], "ans": 0, "exp": "Người dẫn sơ tán phải là nhân viên an toàn đã được huấn luyện, biết lối thoát và quy trình."}, {"q": "During a VIP reception, catering staff are delayed. Guests begin to complain to the front-of-house team. What should the FOH staff do?", "opts": ["Apologize, explain the delay, and offer drinks while waiting", "Tell guests to speak directly to catering staff as it is not their fault", "Ignore complaints", "Close the reception early"], "ans": 0, "exp": "Xin lỗi, giải thích lý do và mời đồ uống trong lúc khách chờ."}, {"q": "You're organizing a music festival in a public park. Local residents are concerned about noise and crowding. What is the most effective stakeholder management strategy?", "opts": ["Ignore them - they don't attend the event", "Give them free tickets and increase ticket prices for event attendees (avoid over budget)", "Include them in planning discussions and communicate noise control measures", "Announce the event only a few days before"], "ans": 2, "exp": "Đưa cư dân vào bàn thảo luận và truyền đạt biện pháp kiểm soát tiếng ồn."}, {"q": "What is contingency planning in site management?", "opts": ["Event decoration plan", "Plan to invite stakeholders", "Backup plans for potential issues", "Plan to invite celebrities"], "ans": 2, "exp": "Contingency planning là chuẩn bị sẵn phương án B cho các sự cố có thể xảy ra tại địa điểm."}, {"q": "During a banquet, the catering team runs out of dessert. What is the most professional response?", "opts": ["Tell guests there is no dessert", "Offer an alternative item immediately", "Ignore the guest's complaint because there are more important issues to address", "Cancel the rest of the service"], "ans": 1, "exp": "Đưa ngay món thay thế; giữ trải nghiệm khách liền mạch."}, {"q": "Shuttle buses for guests are delayed by 30 minutes. What is the best action?", "opts": ["Do nothing and hope they arrive soon", "Inform guests of the delay and provide refreshments", "Cancel the shuttle service", "All answers are correct"], "ans": 1, "exp": "Thông báo khách về việc trễ và phục vụ nhẹ trong lúc chờ."}, {"q": "What is a contingency plan?", "opts": ["Backup plan for unexpected issues", "Main event plan", "Plan that prevents all risks", "Staff schedule"], "ans": 0, "exp": "Contingency plan = kế hoạch dự phòng cho tình huống bất ngờ."}, {"q": "What is the first step in managing an event on the day?", "opts": ["Conducting a team briefing", "Demographic research", "Designing décor", "Posting on social media"], "ans": 0, "exp": "Ngày diễn ra luôn mở đầu bằng team briefing: ai đứng đâu, làm gì, báo cho ai khi có vấn đề."}, {"q": "Which item helps attendees find locations on site?", "opts": ["Invoice", "Ticket", "Menu", "Signage"], "ans": 3, "exp": "Signage (biển chỉ dẫn) giúp khách tự tìm đường, giảm tải cho nhân sự."}, {"q": "What is the purpose of a running order?", "opts": ["Hire staff", "Track ticket sales", "Set budget", "Outline event sequence"], "ans": 3, "exp": "Running order liệt kê trình tự các phần của chương trình theo thời gian."}, {"q": "Which is the best way to handle a minor technical issue during a live show?", "opts": ["Stop the show immediately while the issue is resolved", "Apologize repeatedly to the audience", "Fix it quickly without drawing attention", "Cancel the performance"], "ans": 2, "exp": "Xử lý nhanh, kín đáo, không làm gián đoạn buổi diễn."}, {"q": "An attendee faints in the middle of the hall. What's your immediate action?", "opts": ["Move them without help", "Ask them to walk outside", "Call first aid staff", "Offer water only"], "ans": 2, "exp": "Sơ cứu/gọi y tế ngay là ưu tiên số một khi có người ngất."}, {"q": "Which activity is part of the execution phase?", "opts": ["Budgeting", "Marketing review", "Running the event", "Sponsorship pitch"], "ans": 2, "exp": "Execution phase là lúc sự kiện thực sự diễn ra — vận hành chương trình."}, {"q": "Which term refers to closing down the event site?", "opts": ["Load-in", "Load-out", "Setup", "Briefing"], "ans": 1, "exp": "Load-out là quá trình tháo dỡ và dọn địa điểm sau sự kiện, ngược với load-in."}, {"q": "Supplier delivering LED screens will arrive late. What should you do first?", "opts": ["Cancel rehearsal", "Arrange backup supplier", "Reduce rehearsal time", "Wait and hope"], "ans": 1, "exp": "Chuẩn bị nhà cung cấp dự phòng khi thiết bị giao trễ."}, {"q": "How can weather impact logistics?", "opts": ["Changes catering", "Improves décor", "Affects outdoor event setup", "Increases budget"], "ans": 2, "exp": "Thời tiết ảnh hưởng khâu dựng lắp ngoài trời — cần kế hoạch dự phòng."}, {"q": "What is the main focus of event logistics?", "opts": ["Coordinating resources and operations", "Designing décor", "Selling tickets", "Managing celebrities"], "ans": 0, "exp": "Logistics tập trung vào việc điều phối nguồn lực và vận hành: người, thiết bị, hàng hoá, thời gian."}, {"q": "What is the function of signage at an event?", "opts": ["For decoration only", "Guide and inform attendees", "Replace staff", "Only comply with rules"], "ans": 1, "exp": "Biển chỉ dẫn vừa dẫn đường vừa cung cấp thông tin (giờ, khu vực, lối thoát hiểm)."}, {"q": "Why are contingency plans important in event delivery?", "opts": ["They allow team members to take longer breaks", "They eliminate the need for training", "They help manage unexpected disruptions", "They reduce setup costs"], "ans": 2, "exp": "Kế hoạch dự phòng cho phép xử lý gián đoạn mà không làm sập cả chương trình."}, {"q": "Which of the following is a typical risk that must be assessed before an outdoor event?", "opts": ["Unpredictable weather conditions", "Low number of social media posts", "Speaker language preference", "Changes in ticket printing style"], "ans": 0, "exp": "Rủi ro điển hình của sự kiện ngoài trời là thời tiết bất định."}, {"q": "Common tool for tracking real-time issues?", "opts": ["Event management app", "Budget optimization app", "Flyer app", "Map app"], "ans": 0, "exp": "Ứng dụng quản lý sự kiện theo dõi và ghi nhận sự cố theo thời gian thực, ai cũng thấy trạng thái."}, {"q": "Activity after last guest leaves?", "opts": ["Ticket sales", "Load-in and Load-out", "Post-event clean-up", "Promotion"], "ans": 2, "exp": "Sau khi khách cuối rời đi là dọn dẹp hậu sự kiện, rồi mới đến load-out và đánh giá."}]}, {"title": "Module 7 — Đánh giá & Đo lường", "desc": "Đánh giá formative/summative, dữ liệu định tính/định lượng, khảo sát & focus group, KPI/ROI, benchmarking hậu sự kiện.", "qs": [{"q": "Which method observes attendee behaviour directly?", "opts": ["Survey", "Observation", "Interview", "Analytics"], "ans": 1, "exp": "Observation là quan sát trực tiếp hành vi khách — thấy được điều họ làm chứ không phải điều họ nói."}, {"q": "Why is it important for event evaluation questions to link to SMART objectives?", "opts": ["To gather stories for social media, prepare for communication", "To measure success based on intended goals", "To predict competitors' strategies", "To prepare documents for tax reporting"], "ans": 1, "exp": "Câu hỏi đánh giá phải bám mục tiêu SMART, nếu không sẽ đo những thứ không liên quan tới thành công đã định nghĩa."}, {"q": "Which is an example of qualitative event feedback?", "opts": ["Ticket sales figures", "Guest satisfaction comments", "Budget reports", "Attendance numbers"], "ans": 1, "exp": "Bình luận về mức hài lòng là dữ liệu định tính — chữ, không phải số."}, {"q": "Which of the following is NOT a common reason for event evaluation?", "opts": ["Identifying best practices", "Meeting stakeholder expectations", "Determining staff salaries", "Measuring return on investment"], "ans": 2, "exp": "Đánh giá sự kiện phục vụ cải tiến, chứng minh ROI, rút kinh nghiệm. Nó không dùng để quyết định lương nhân viên."}, {"q": "In the planning model, what does 'evaluation' focus on?", "opts": ["Assigning roles", "Initial brainstorming", "Post-event review", "Stage setup"], "ans": 2, "exp": "Trong mô hình lập kế hoạch, evaluation là khâu rà soát sau sự kiện."}, {"q": "Which of the following is a formal method for post-event evaluation?", "opts": ["Verbal comments from guests", "Debrief meeting with the event team", "Handshake agreement with sponsors", "Social media photo uploads"], "ans": 1, "exp": "Debrief meeting với đội ngũ là phương pháp chính thức, có cấu trúc để rút kinh nghiệm."}, {"q": "How can post-event evaluation start on event day?", "opts": ["Collect feedback from attendees", "Ask attendees to complete a satisfaction survey before entering the event", "Post-event evaluation cannot start on the day of the event", "All answers are correct"], "ans": 0, "exp": "Thu thập phản hồi ngay trong ngày diễn ra khi ấn tượng còn tươi — đánh giá bắt đầu sớm hơn nhiều người nghĩ."}, {"q": "Why should evaluation be integrated into planning?", "opts": ["Ensures relevant data is collected", "To make the plan longer and more detailed", "To allow event attendees to view the plan", "All answers are correct"], "ans": 0, "exp": "Cài đánh giá vào từ khâu lập kế hoạch để biết cần thu dữ liệu gì, thu lúc nào. Nghĩ tới lúc kết thúc thì đã muộn."}, {"q": "What is qualitative data?", "opts": ["Non-numerical information", "Numerical information", "Budget figures", "All answers are correct"], "ans": 0, "exp": "Qualitative data là thông tin phi số: nhận xét, phỏng vấn, quan sát mô tả."}, {"q": "What is the challenge of self-reported data?", "opts": ["Takes longer", "Costs more", "May be biased or inaccurate", "Requires stakeholder involvement"], "ans": 2, "exp": "Dữ liệu tự báo cáo phụ thuộc trí nhớ và mong muốn làm hài lòng người hỏi, nên dễ lệch."}, {"q": "Which tool is best for real-time feedback?", "opts": ["Banner", "Poster", "Brochure", "Mobile polling app"], "ans": 3, "exp": "Ứng dụng bình chọn trên điện thoại cho phản hồi ngay lập tức khi sự kiện đang diễn ra."}, {"q": "Which unit covers feedback and lessons learned?", "opts": ["Augmented Reality", "Annual Revenue", "Average Rating", "Applied Research"], "ans": 0, "exp": "Đây là câu ghi nhớ tên unit trong giáo trình — phần về feedback và bài học kinh nghiệm nằm trong unit \"Augmented Reality\"."}, {"q": "Which factor is key to future event success?", "opts": ["Low ticket price", "Fixed plans", "Adaptability", "Single channel"], "ans": 2, "exp": "Khả năng thích ứng quyết định sự kiện lần sau — biết học từ dữ liệu và điều chỉnh."}, {"q": "What is an advantage of online surveys?", "opts": ["Guaranteed 100% response", "No analysis needed", "Quick distribution and data collection", "Works without internet"], "ans": 2, "exp": "Khảo sát online gửi nhanh, thu về nhanh và dữ liệu đã ở dạng số hoá sẵn để phân tích."}, {"q": "When is the best time to send a post-event survey?", "opts": ["Six months later", "Within a few days after the event", "Before the event starts", "During ticket purchase"], "ans": 1, "exp": "Gửi trong vài ngày sau sự kiện: khách còn nhớ chi tiết nhưng đã có khoảng lặng để suy nghĩ."}, {"q": "What is the advantage of focus groups?", "opts": ["In-depth qualitative feedback", "Quick numerical data", "Lower costs", "More ticket sales"], "ans": 0, "exp": "Focus group cho phản hồi định tính sâu, người tham gia phản ứng qua lại và làm bật ra ý mới."}, {"q": "Which method collects the most in-depth personal feedback?", "opts": ["Email surveys", "Website analytics", "Attendance count", "One-on-one interviews"], "ans": 3, "exp": "Phỏng vấn một-một cho chiều sâu cá nhân lớn nhất, không bị ảnh hưởng bởi ý kiến người khác."}, {"q": "Which metric is best for measuring financial success?", "opts": ["Net profit", "Number of volunteers", "Social media likes", "Weather conditions"], "ans": 0, "exp": "Net profit (lợi nhuận ròng) là thước đo tài chính chuẩn — doanh thu trừ toàn bộ chi phí."}, {"q": "Which method collects feedback using a set of questions?", "opts": ["Survey", "Observation", "Social listening", "Audit"], "ans": 0, "exp": "Survey thu phản hồi bằng bộ câu hỏi chuẩn hoá cho nhiều người."}, {"q": "Which evaluation stage happens during the event?", "opts": ["Formative", "Summative", "Post-event", "Pre-event"], "ans": 0, "exp": "Formative evaluation diễn ra trong lúc sự kiện chạy, cho phép điều chỉnh ngay."}, {"q": "What is one reason post-event feedback is important for sponsors?", "opts": ["To reduce tax", "To prove ROI and future collaboration value", "To register their suppliers", "To assign roles for next event"], "ans": 1, "exp": "Nhà tài trợ cần bằng chứng ROI để duyệt ngân sách hợp tác lần sau."}, {"q": "Which is a post-event activity?", "opts": ["Ticketing", "Promotion", "Evaluation", "Lighting test"], "ans": 2, "exp": "Evaluation là hoạt động hậu sự kiện, sau khi đã dọn dẹp và load-out."}, {"q": "One reason to evaluate an event is to:", "opts": ["Sell t-shirts", "Improve future events", "Print brochures", "Entertain staff"], "ans": 1, "exp": "Mục đích cốt lõi của đánh giá là cải thiện các sự kiện tiếp theo."}, {"q": "What does KPI stand for?", "opts": ["Known Project Issue", "Key Planning Insight", "Knowledge Process Integration", "Key Performance Indicator"], "ans": 3, "exp": "KPI = Key Performance Indicator — chỉ số đo hiệu quả."}, {"q": "Which is a quantitative measure?", "opts": ["Number of attendees", "Attendee opinions", "Stakeholder comments", "Photographs"], "ans": 0, "exp": "Số lượng khách tham dự là con số → định lượng. Bình luận, cảm nhận là định tính."}, {"q": "Tool tracking online event engagement?", "opts": ["Flyer", "Budget app", "Brochure", "Analytics software"], "ans": 3, "exp": "Analytics software theo dõi tương tác trực tuyến: lượt xem, thời gian ở lại, tỷ lệ thoát."}, {"q": "Measurable indicators of performance?", "opts": ["Key Performance Indicators", "Event Objectives", "Stakeholders", "Budgets"], "ans": 0, "exp": "KPI = Key Performance Indicators, các chỉ số đo lường hiệu quả đã định trước."}, {"q": "Evaluation occurring after event?", "opts": ["Formative", "Summative", "Ongoing", "Continuous"], "ans": 1, "exp": "Summative = đánh giá sau sự kiện; đối lập với formative (trong quá trình)."}]}, {"title": "Module 8 — Xu hướng & Công nghệ", "desc": "Sự kiện hybrid/ảo, QR & check-in không chạm, cá nhân hóa bằng dữ liệu, tính bền vững (ISO 20121).", "qs": [{"q": "What is a hybrid event?", "opts": ["Combination of in-person and virtual", "Only in-person", "Only virtual", "A themed dinner"], "ans": 0, "exp": "Hybrid event kết hợp khách có mặt trực tiếp và khách tham dự trực tuyến cùng lúc."}, {"q": "Factor driving demand for virtual events?", "opts": ["Global accessibility", "High catering costs", "Limited decor", "Weather changes"], "ans": 0, "exp": "Sự kiện ảo bùng nổ vì bất kỳ ai ở đâu cũng tham dự được, không tốn chi phí đi lại."}, {"q": "Trend using data for personalized experiences?", "opts": ["Random selection", "Mass marketing", "Data-driven personalization", "General planning"], "ans": 2, "exp": "Data-driven personalization dùng dữ liệu hành vi để cá nhân hoá nội dung và gợi ý cho từng khách."}, {"q": "Environmental certification events aim for?", "opts": ["LEED", "ISO 9001", "CE Mark", "ISO 20121"], "ans": 3, "exp": "ISO 20121 là tiêu chuẩn quốc tế về quản lý sự kiện bền vững."}, {"q": "Technology supporting contactless check-in?", "opts": ["Paper tickets", "QR codes", "Manual lists", "Phone calls"], "ans": 1, "exp": "Mã QR cho phép check-in không chạm, giảm xếp hàng và tiếp xúc."}]}];
const ALL = DATA.flatMap((m,mi)=>m.qs.map((q,qi)=>({...q,mi,label:m.title.split(' — ')[0]})));
let mode='home', mod=null, idx=0, picked=null, score=0, quizSet=[], wrongs=[];
const $=s=>document.querySelector(s);
const modes=[['home','📚 Module'],['flash','🔁 Flashcard'],['quiz','🎯 Quiz'],['tips','💡 Mẹo học'],['search','🔍 Tra cứu']];

function tabs(){$('#tabs').innerHTML=modes.map(([k,l])=>`<div class="tab ${mode===k?'on':''}" onclick="go('${k}')">${l}</div>`).join('')}
function go(m){mode=m;mod=null;idx=0;picked=null;score=0;wrongs=[];if(m==='quiz')startQuiz();render()}
function pool(){return mod===null?ALL:DATA[mod].qs.map(q=>({...q,mi:mod,label:DATA[mod].title.split(' — ')[0]}))}

function startQuiz(){let p=pool().slice();for(let i=p.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[p[i],p[j]]=[p[j],p[i]]}quizSet=p.slice(0,Math.min(20,p.length));idx=0;score=0;picked=null;wrongs=[]}

function render(){tabs();const a=$('#app');
 if(mode==='home'){a.innerHTML=`<div class="mods">${DATA.map((m,i)=>`<div class="mod" onclick="openMod(${i})"><h3>${m.title}</h3><p>${m.desc}</p><span class="badge">${m.qs.length} câu</span></div>`).join('')}</div>`;return}
 if(mode==='view'){const m=DATA[mod];a.innerHTML=`<div class="nav" style="margin-bottom:14px"><button class="btn gh" onclick="go('home')">← Quay lại</button><span class="stats">${m.qs.length} câu</span></div>`+m.qs.map((q,i)=>`<div class="card"><div class="qnum">${i+1}. ${m.title.split(' — ')[0]}</div><div class="qtext">${esc(q.q)}</div>${q.opts.map((o,j)=>`<div class="opt ${j===q.ans?'correct':''}" style="cursor:default">${'ABCD'[j]}. ${esc(o)}</div>`).join('')}${q.exp?`<div class="exp">${md(q.exp)}</div>`:''}</div>`).join('');return}
 if(mode==='flash'){const p=pool();const q=p[idx];a.innerHTML=`
  ${modSel()}<div class="bar"><i style="width:${(idx+1)/p.length*100}%"></i></div>
  <div class="card flip" onclick="picked=picked?null:1;render()"><div class="qnum">Câu ${idx+1}/${p.length} · ${q.label}</div><div class="qtext">${esc(q.q)}</div>
  ${picked?`<div class="ans">${'ABCD'[q.ans]}. ${esc(q.opts[q.ans])}</div>${q.exp?`<div class="exp">${md(q.exp)}</div>`:''}`:'<div class="hint">Chạm để xem đáp án</div>'}</div>
  <div class="nav"><button class="btn gh" onclick="idx=(idx-1+${p.length})%${p.length};picked=null;render()">← Trước</button><button class="btn" onclick="idx=(idx+1)%${p.length};picked=null;render()">Tiếp →</button></div>`;return}
 if(mode==='quiz'){
  if(idx>=quizSet.length){a.innerHTML=`<div class="card res"><div class="big">${score}/${quizSet.length}</div><p style="color:#8b90a0;margin:10px 0 20px">${score/quizSet.length>=.8?'Tốt lắm! 🎉':'Ôn lại các câu sai bên dưới nhé.'}</p><button class="btn" onclick="startQuiz();render()">Làm lại</button></div>`+ (wrongs.length?`<h3 style="font-size:15px;margin:20px 0 12px;color:#ffb0bd">Câu sai (${wrongs.length})</h3>`+wrongs.map(q=>`<div class="card"><div class="qtext">${esc(q.q)}</div><div class="opt correct" style="cursor:default">${'ABCD'[q.ans]}. ${esc(q.opts[q.ans])}</div>${q.exp?`<div class="exp">${md(q.exp)}</div>`:''}</div>`).join(''):'');return}
  const q=quizSet[idx];
  a.innerHTML=`${modSel()}<div class="bar"><i style="width:${idx/quizSet.length*100}%"></i></div>
  <div class="card"><div class="qnum">Câu ${idx+1}/${quizSet.length} · ${q.label} <span style="float:right;color:#5b8def">Đúng: ${score}</span></div><div class="qtext">${esc(q.q)}</div>
  ${q.opts.map((o,j)=>{let c='';if(picked!==null){if(j===q.ans)c='correct';else if(j===picked)c='wrong'}return `<button class="opt ${c}" ${picked!==null?'disabled':''} onclick="pick(${j})">${'ABCD'[j]}. ${esc(o)}</button>`}).join('')}
  ${picked!==null&&q.exp?`<div class="exp">${md(q.exp)}</div>`:''}
  ${picked!==null?`<div class="nav" style="margin-top:14px"><button class="btn" onclick="idx++;picked=null;render()">${idx+1<quizSet.length?'Câu tiếp →':'Xem kết quả'}</button></div>`:''}</div>`;return}
 if(mode==='tips'){a.innerHTML=
   `<div class="card"><h3 style="font-size:15px;margin-bottom:12px;color:#5b8def">⭐ Nguyên tắc chung — đọc trước tiên</h3>`
   + TIPS.g.map(([t,d])=>`<div class="tip"><b>${t}</b><div>${md(d)}</div></div>`).join('') + `</div>`
   + TIPS.m.map((m,i)=>`<div class="card"><h3 style="font-size:15px;margin-bottom:12px;color:#8ff0b8">${m.t}</h3>${m.k.map(([t,d])=>`<div class="tip"><b>${t}</b><div>${md(d)}</div></div>`).join('')}</div>`).join('');
  return}
 if(mode==='search'){a.innerHTML=`<input class="s" id="sq" placeholder="Gõ từ khoá (VD: SWOT, venue, budget, risk...)" oninput="doSearch()"><div id="sr"></div>`;$('#sq').focus();doSearch();return}
}
function pick(j){const q=quizSet[idx];picked=j;if(j===q.ans)score++;else wrongs.push(q);render()}
function openMod(i){mod=i;mode='view';render()}
function modSel(){return `<select class="s" onchange="mod=this.value===''?null:+this.value;idx=0;picked=null;${mode==='quiz'?'startQuiz();':''}render()">
 <option value=""${mod===null?' selected':''}>Tất cả 204 câu</option>
 ${DATA.map((m,i)=>`<option value="${i}"${mod===i?' selected':''}>${m.title} (${m.qs.length})</option>`).join('')}</select>`}
function doSearch(){const v=$('#sq').value.toLowerCase().trim();if(v.length<2){$('#sr').innerHTML='<p style="color:#6b7185;font-size:13px">Nhập ít nhất 2 ký tự…</p>';return}
 const r=ALL.filter(q=>(q.q+' '+q.opts.join(' ')+' '+q.exp).toLowerCase().includes(v)).slice(0,40);
 $('#sr').innerHTML=r.length?`<p style="color:#6b7185;font-size:13px;margin-bottom:12px">${r.length} kết quả</p>`+r.map(q=>`<div class="card"><div class="qnum">${q.label}</div><div class="qtext">${esc(q.q)}</div><div class="opt correct" style="cursor:default">${'ABCD'[q.ans]}. ${esc(q.opts[q.ans])}</div>${q.exp?`<div class="exp">${md(q.exp)}</div>`:''}</div>`).join(''):'<p style="color:#6b7185;font-size:13px">Không tìm thấy.</p>'}
function md(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b style="color:#cdd6f4">$1</b>').replace(/\*(.+?)\*/g,'<i style="color:#9aa3bd">$1</i>')}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
render();
</script></body></html>
